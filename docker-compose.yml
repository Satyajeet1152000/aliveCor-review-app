services:
  postgres:
    image: postgres:16-alpine
    container_name: review-dash-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: review-dash
      POSTGRES_PASSWORD: review-dash
      POSTGRES_DB: review_dash
    volumes:
      - review_dash_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U review-dash -d review_dash"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  review_dash_postgres_data:
